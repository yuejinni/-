plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.qihang.pda'
    compileSdk 34

    defaultConfig {
        applicationId "com.qihang.pda"
        minSdk 21          // Android 5.0+，Sunmi L2S-PRO 为 Android 11
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            // 直接 release 包，无需混淆（内网 App）
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    // WebView 使用系统自带，无需额外依赖
}
